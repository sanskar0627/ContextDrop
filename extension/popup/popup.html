<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextDrop</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div>
          <h1>ContextDrop</h1>
          <p>Recent bookmarks</p>
        </div>
        <button id="open-dashboard" class="ghost" aria-label="Open dashboard">Dashboard</button>
      </header>

      <section id="bookmarks" class="bookmarks">
        <p class="loading">Loading...</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
